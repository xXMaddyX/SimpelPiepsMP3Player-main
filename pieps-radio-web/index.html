<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pieps Radio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app theme-blue" id="app">

    <header class="topbar">
      <div class="topbar-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8.56 2.9A7 7 0 0 1 19 9v4"/>
          <path d="M5 9A10 10 0 0 1 19.36 4"/>
          <rect x="3" y="9" width="18" height="13" rx="2"/>
          <circle cx="8.5" cy="16" r="1.5" fill="currentColor" stroke="none"/>
          <line x1="12" y1="14" x2="12" y2="18"/>
          <line x1="16" y1="14" x2="16" y2="18"/>
        </svg>
        <span class="app-name">Pieps Radio</span>
        <span class="app-sub">by PiepsSoft</span>
      </div>
      <div class="topbar-right">
        <div class="theme-picker">
          <button class="theme-btn" data-theme="blue"   title="Blau"></button>
          <button class="theme-btn" data-theme="purple" title="Lila"></button>
          <button class="theme-btn" data-theme="green"  title="Grün"></button>
          <button class="theme-btn" data-theme="pink"   title="Pink"></button>
        </div>
      </div>
    </header>

    <div class="content">

      <!-- Station list sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">Radiosender</h2>
          <span class="track-count" id="station-count"></span>
        </div>

        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Sender suchen…"
            spellcheck="false"
            autocomplete="off"
          />
          <button id="clear-btn" class="clear-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="station-list" id="station-list"></div>
      </aside>

      <!-- Main display area -->
      <main class="main-view" id="main-view">
        <div class="bg-glow" id="bg-glow"></div>
        <div class="content-wrapper">
          <div class="mascot-wrap" id="mascot-wrap">
            <div class="ring" id="mascot-ring"></div>
            <img src="../src/assets/PiepsmitTasse.png" class="mascot" alt="Pieps" draggable="false" />
          </div>
          <div id="track-display"></div>
        </div>
      </main>

    </div>

    <footer class="player-bar">

      <div class="radio-row">
        <div class="live-badge" id="live-badge">
          <span class="live-dot"></span>
          LIVE
        </div>
        <div class="live-track-name" id="live-track-name">Kein Sender ausgewählt</div>
      </div>

      <div class="controls-row">
        <div class="controls-side left">
          <button class="ctrl-btn" id="mute-btn" title="Stummschalten (M)"></button>
          <div class="vol-track">
            <div class="vol-fill" id="vol-fill"></div>
            <input type="range" class="range-overlay" id="vol-slider" min="0" max="1" step="0.01" value="0.8" />
          </div>
        </div>
        <div class="controls-center">
          <button class="play-btn" id="play-btn" title="Play / Pause (Space)"></button>
        </div>
        <div class="controls-side right">
          <div class="now-playing-right" id="now-playing-right">
            <span class="np-label">Jetzt läuft</span>
            <span class="np-name" id="np-name-right">—</span>
          </div>
        </div>
      </div>

    </footer>

  </div>

  <audio id="audio"></audio>
  <script src="app.js"></script>
</body>
</html>
